<meta charset="utf-8">
<script>

    alert(`Exercício 5 - Estrutura Sequencial  [Cálculo do Salário por Horas Trabalhadas]`)
    // entrada
    let numHoras, valorHora, salarioFinal
    numHoras = parseFloat(prompt(`Insira o seu número de horas trabalhadas:`))
    valorHora = parseFloat(prompt(`Insira o valor por hora trabalhada:`))

    // processamento
    salarioFinal = numHoras * valorHora

    // saida
    document.write(`Seu salário com total é de R$ ${salarioFinal.toFixed(2)}.`)

</script>
