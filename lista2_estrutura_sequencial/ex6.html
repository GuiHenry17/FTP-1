<meta charset="utf-8">
<script>

    alert(`Exercício 6 - Estrutura Sequencial  [Área de um Terreno Retangular]`)
    // entrada
    let largura, comprimento, area
    largura = parseFloat(prompt(`Insira o valor da largura do retângulo (em metros/m):`))
    comprimento = parseFloat(prompt(`Insira o valor do comprimento do retângulo (em metros/m):`))

    // processamento
    area = largura * comprimento

    // saida
    document.write(`A área do seu terreno retangular é de: ${area} m².`)

</script>
