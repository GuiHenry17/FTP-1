<meta charset="utf-8">
<script>

    alert(`Exercício 2 - Estrutura Sequencial  [Conversão de Idade]`)
    // entrada
    let idade, idadeMeses, idadeDias
    idade = parseFloat(prompt(`Insira sua idade (em anos):`))

    // processamento
    idadeMeses = idade * 12
    idadeDias = idade * 365

    // saida
    document.write(`Sua idade em meses é: ${idadeMeses} meses; <br>`)
    document.write(`Sua idade em dias é: ${idadeDias} dias.`)

</script>
