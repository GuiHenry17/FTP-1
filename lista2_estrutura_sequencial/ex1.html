<meta charset="UTF-8">
<script>

    alert(`Exercício 1 - Estrutura Sequencial  [Preço Total da Compra]`)
    // entrada
    let preco, quantidade, valorTotal
    quantidade = parseFloat(prompt(`Insira a quantidade do produto desejado:`))
    preco = parseFloat(prompt(`Insira o preço unitário do produto:`))

    //processamento
    valorTotal = preco * quantidade

    //saida
    document.write(`O valor total da compra é de: R$${valorTotal.toFixed(2)}`)

</script>
