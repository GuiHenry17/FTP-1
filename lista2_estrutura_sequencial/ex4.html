<meta charset="utf-8">
<script>

    alert(`Exercício 4 - Estrutura Sequencial  [Salário com Bônus]`)
    // entrada
    let salario, bonusSalarial, salarioFinal
    salario = parseFloat(prompt(`Insira o seu salário:`))
    bonusSalarial = parseFloat(prompt(`Insira o bônus salarial:`))

    // processamento
    salarioFinal = salario + bonusSalarial

    // saida
    document.write(`Seu salário com bônus somado é de R$ ${salarioFinal.toFixed(2)}.`)

</script>
