<meta charset="utf-8">
<script>

    alert(`Exercício 3 - Estrutura Sequencial  [Consumo Médio de Combustível]`)
    // entrada
    let distancia, quantCombustivel, consumoMedio
    distancia = parseFloat(prompt(`Insira a distância percorrida (em kilometros/km):`))
    quantCombustivel = parseFloat(prompt(`Insira o consumo de combustível (em litros/l):`))

    // processamento
    consumoMedio = distancia / quantCombustivel

    // saida
    document.write(`Seu consumo médio de combustível é de: ${consumoMedio} km/l.`)

</script>
