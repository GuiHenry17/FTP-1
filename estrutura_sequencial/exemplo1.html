<meta charset="utf-8">
<script>

    let base, altura, area;

    base = prompt("Informe a base do triângulo")
    altura = prompt("Informe a altura do triângulo")

    //processamento
    area = (base * altura) / 2

    //saida
    document.write(`base: ${base} altura: ${altura} <br>`)
    document.write(`A área é de: ${area}`)

</script>
