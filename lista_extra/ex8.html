<meta charset="UTF-8">
<script>

    alert(`Exercício 8 - Lista Extra  [ Cálculo do volume de uma caixa ]`)
    // entrada
    let comprimento, largura, altura, volume
    comprimento = parseFloat(prompt(`Insira o valor da comprimento em m:`))
    largura = parseFloat(prompt(`Insira o valor da largura em m:`))
    altura = parseFloat(prompt(`Insira o valor da altura em m:`))

    //processamento
    volume = comprimento * largura * altura

    //saida
    document.write(`O valor total do volume da caixa é de: ${volume.toFixed(1)} m³ <br>`)

</script>
