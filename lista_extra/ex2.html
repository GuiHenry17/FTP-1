<meta charset="UTF-8">
<script>

    alert(`Exercício 2 - Lista Extra  [ Conversão de temperatura ]`)
    // entrada
    let tempCelsius, tempFahrenheit
    tempCelsius = parseFloat(prompt(`Insira a temperatura (em graus Celsius):`))

    //processamento
    tempFahrenheit = (tempCelsius * 9 / 5) + 32

    //saida
    document.write(`A temperatura em graus Fahrenheit é de: ${tempFahrenheit}Fº`)

</script>
