<meta charset="UTF-8">
<script>

    alert(`Exercício 5 - Lista Extra  [ Conversão de tempo ]`)
    // entrada
    let valorDias, valorHoras, valorMinutos, valorSegundos
    valorDias = parseFloat(prompt(`Insira o valor total de dias:`))

    //processamento
    valorHoras = valorDias * 24
    valorMinutos = valorHoras * 60
    valorSegundos = valorMinutos * 60

    //saida
    document.write(`O valor total de ${valorDias} dia(s) em horas é de: ${valorHoras}h <br>`)
    document.write(`O valor total de ${valorDias} dia(s) em minutos é de: ${valorMinutos}min<br>`)
    document.write(`O valor total de ${valorDias} dia(s) em segundos é de: ${valorSegundos}s<br>`)

</script>
