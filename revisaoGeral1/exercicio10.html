<meta charset="utf-8">
<script>

    alert(`Exercício 10 - If / Else Simples [Frequência Mínima]`)
    // entrada
    let frequencia, situacao
    frequencia = parseFloat(prompt(`Insira o percentual de frequência do aluno:`))

    // processamento
    if (frequencia >= 75) {
        situacao = `Frequência suficiente`
    } else {
        situacao = `Frequência insuficiente`
    }

    // saida
    document.write(`**** Frequência Mínima **** <br>`)
    document.write(`Percentual de frequência do aluno: ${frequencia}% <br>`)
    document.write(`Situação da frequência: ${situacao}`)

</script>
