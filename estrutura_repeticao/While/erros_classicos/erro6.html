<meta charset="UTF-8">
<script>
    //erro classico 6: incrementar ou modificar a variável errada / Inserção incorreta uma variável no laço de forma

    //Faça um programa que exiba os números de 1 à 10 na tela e no final retorne soma dos mesmos

    let i = 1, soma = 0;
    while (i <= 10) {

        document.write(`${i}<br>`)
        soma += i; //equivale a soma = soma + i
        i++ //equivale i = i + 1;
    }
    document.write(`<br>Soma: ${soma}`)

</script>
