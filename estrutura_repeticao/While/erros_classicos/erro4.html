<meta charset="UTF-8">
<script>
    //erro classico 4: Erro de Off-by-One (limite errado por 1)

    //Preciso imprimir de 1 a 10, mas imprimi de 1 a 9

    let i = 1;
    while (i <= 10) { //se a condição for i < 10 irá gerar a saída incorreta
        document.write(`linha ${i} - Oi <br>`)
        i++;
    }

</script>
