<meta charset="utf-8">
<script>

    alert(`Exercício 1 - Estrutura Condicional Simples [Número Positivo]`)

    let num, situacao
    num = parseFloat(prompt(`Insira o número a ter a positividade verificada:`))

    if (num > 0) {
        situacao = "Número positivo."
    }

    if (num <= 0){
        situacao = "Número negativo ou igual a 0."
    }

    document.write(`O número informado foi: ${num}. <br>`)
    document.write(`Situação: ${situacao}`)

</script>
