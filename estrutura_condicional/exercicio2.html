<meta charset="utf-8">
<script>

    alert(`Exercício 2 - Estrutura Condicional  [Número Negativo]`)

    let num, situacao
    num = parseFloat(prompt(`Insira o número a ter a negatividade verificada:`))

    if (num < 0) {
        situacao = "Número negativo."
    }

     if (num >= 0) {
        situacao = "Número positivo ou igual a 0."
    }

    document.write(`O número informado foi: ${num}. <br>`)
    document.write(`Situação: ${situacao}`)

</script>
