<meta charset="utf-8">
<script>

    alert(`Exercicio 12 - Estrutura Condicional Composta [Pode votar ou não]`)

    let idade, resultado
    idade = parseFloat(prompt(`Informe a idade (em anos):`));

    if (idade >= 16) {
        resultado = "pode votar."
    } else {
        resultado = "não pode votar."
    }
  

    document.write(`O indivíduo com idade ${idade} ${resultado}`)
</script>
