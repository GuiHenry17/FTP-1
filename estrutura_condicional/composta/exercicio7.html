<meta charset="utf-8">
<script>

    alert(`Exercicio 7 - Estrutura Condicional Composta [Par ou ímpar]`)

    let num, resultado;
    num = Number(prompt(`Informe o número:`));

    if (num % 2 == 0){
        resultado = `par.`
    } else{
        resultado = "ímpar."
    }

    document.write(`O número ${num} é ${resultado}`)
</script>
