<meta charset="utf-8">
<script>

    alert(`Exemplo 3 - Estrutura Condicional Composta [Sinal do número]`)

    let num;
    num = Number(prompt(`Informe o número:`));

    if (num > 0) {
        document.write(`O número: ${num} - é POSITIVO`);
    }
    else {
        if (num == 0) {
            document.write(`O número: ${num} - é NULO`);
        }
        else {
            document.write(`O número: ${num} - é NEGATIVO`);
        }

    }
</script>
