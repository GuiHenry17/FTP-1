<meta charset="utf-8">
<script>

    alert(`Exercicio 10 - Estrutura Condicional Composta [Positivo ou não positivo]`)

    let num, resultado;
    num = Number(prompt(`Informe o número a ter seu sinal verificado:`));

    if (num > 0) {
        resultado = `O número ${num} é positivo.`
    } else if (num == 0) {
        resultado = `O número ${num} é nulo.`
    } else {
        resultado = `O número ${num} é negativo.`
    }

    document.write(`${resultado}`)
</script>
