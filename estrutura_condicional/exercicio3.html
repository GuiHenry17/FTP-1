<meta charset="utf-8">
<script>

    alert(`Exercício 3 - Estrutura Condicional  [Número maior que 100]`)

    let num, situacao
    num = parseFloat(prompt(`Insira o número a ser verificado se é maior que 100:`))

    if (num > 100) {
        situacao = "Valor alto."
    }

    if (num <= 100) {
        situacao = "Valor menor ou igual a 100."
    }

    document.write(`O número informado foi: ${num}. <br>`)
    document.write(`Situação: ${situacao}`)

</script>
