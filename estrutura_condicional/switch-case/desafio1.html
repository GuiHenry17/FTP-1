<meta charset="utf-8">
<script>

    let opcao = parseFloat(prompt(`Insira uma opção: \n 1 - Cadastrar \n 2 - Alterar \n 3 - Excluir`))

    switch (opcao) {
        case 1:
            document.write(`1- Cadastrar <br>`)
            break;
        case 2:
            document.write(`2- Alterar <br>`)
            break;
        case 3:
            document.write(`3- Excluir <br>`)
            break;
        default:
            document.write(`Opção inválida`)
    }

</script>
