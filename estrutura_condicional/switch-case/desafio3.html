<meta charset="utf-8">
<script>

    let opcao = Number(prompt(`Insira o número a ter a paridade verificada:`))

    switch (opcao % 2 == 0) {
        case true:
            document.write(`Par.`)
            break;
        case false:
            document.write(`Ímpar.`)
            break;
        default:
            document.write(`Opção inválida`)
    }

</script>
