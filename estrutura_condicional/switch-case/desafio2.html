<meta charset="utf-8">
<script>

    let opcao = prompt(`M - Masculino; \n F - Feminino`).toUpperCase()

    switch (opcao) {
        case 'M':
            document.write(`Masculino.`)
            break;
        case 'F':
            document.write(`Feminino.`)
            break;
        default:
            document.write(`Opção inválida`)
    }

</script>
