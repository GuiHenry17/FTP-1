<meta charset="utf-8">
<script>

    alert(`Exercicio 8 - Estrutura Condicional Composta [Aprovado ou reprovado]`)

    let notaFinal, resultado;
    notaFinal = Number(prompt(`Informe a nota final do aluno:`));

    if (notaFinal >= 6){
        resultado = 'Aprovado,'
    } else{
        resultado = 'Reprovado,'
    }

    document.write(`O aluno foi ${resultado} com nota ${notaFinal}.`)
</script>
