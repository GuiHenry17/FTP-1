<meta charset="utf-8">
<script>

    alert(`Exercicio 14 - Estrutura Condicional Aninhada [Maior entre três números]`)

    let n1, n2, n3, resultado;
    n1 = Number(prompt(`Informe o primeiro número:`));
    n2 = Number(prompt(`Informe o segundo número:`));
    n3 = Number(prompt(`Informe o terceiro número:`));

    if (n1 > n2 && n1 > n3) {
        resultado = `O maior número é ${n1}.`
    } else {
        if (n2 > n1 && n2 > n3) {
            resultado = `O maior número é ${n2}.`
        } else {
            if (n3 > n1 && n3 > n2) {
                resultado = `O maior número é ${n3}.`
            } else {
                resultado = `Os valores são iguais.`
            }
        }
    }

    document.write(resultado)

</script>
